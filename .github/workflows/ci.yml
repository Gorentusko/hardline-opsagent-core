name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}
      OPSAGENT_LLM_PROVIDER: mock
      OPSAGENT_REPORT_DIR: ${{ github.workspace }}/data/reports
      OPSAGENT_STATE_DIR: ${{ github.workspace }}/data/state

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Prepare writable data dirs
        run: |
          mkdir -p data/reports data/state

      - name: Lint
        run: ruff check app tests

      - name: Test
        run: python -m pytest -q

